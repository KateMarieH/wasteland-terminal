<script>
  /********************
   * USER NAME + CLOCK
   ********************/
  const NAME_KEY = "wt_user_name_v1";
  const userNameEl = document.getElementById("userName");
  const localTimeEl = document.getElementById("localTime");

  function tickClock(){
    localTimeEl.textContent = new Date().toLocaleString();
  }
  setInterval(tickClock, 1000);
  tickClock();

  // Simple inline name prompt (only if missing)
  let savedName = localStorage.getItem(NAME_KEY);
  if (!savedName){
    savedName = prompt("ENTER USER NAME (ALIAS):") || "WANDERER";
    savedName = savedName.trim().slice(0, 18) || "WANDERER";
    localStorage.setItem(NAME_KEY, savedName.toUpperCase());
  }
  userNameEl.textContent = localStorage.getItem(NAME_KEY);

  /********************
   * COMMUNITY CHAT LINK
   ********************/
  // Optional: a community chat link (Discord invite, etc.)
  document.getElementById("chatLink").href = "#";

  /********************
   * VISITOR COUNTER (LOCAL)
   * (Real global counter requires a backend later.)
   ********************/
  const COUNTER_KEY = "wt_local_visits_v1";
  const flipCounter = document.getElementById("flipCounter");

  function renderFlipNumber(num, digits=6){
    const s = String(num).padStart(digits, "0");
    flipCounter.innerHTML = "";
    [...s].forEach(ch => {
      const d = document.createElement("div");
      d.className = "flipDigit";
      d.innerHTML = `<div class="old">${ch}</div><div class="new">${ch}</div>`;
      flipCounter.appendChild(d);
    });
  }

  function setFlipNumber(newNum){
    const digits = 6;
    const old = Number(localStorage.getItem(COUNTER_KEY) || "0");
    localStorage.setItem(COUNTER_KEY, String(newNum));

    const oldStr = String(old).padStart(digits, "0");
    const newStr = String(newNum).padStart(digits, "0");

    // initial render if empty
    if (!flipCounter.children.length){
      renderFlipNumber(old, digits);
    }

    [...flipCounter.children].forEach((el, i) => {
      const o = el.querySelector(".old");
      const n = el.querySelector(".new");
      if (!o || !n) return;

      if (oldStr[i] !== newStr[i]){
        o.textContent = oldStr[i];
        n.textContent = newStr[i];
        el.classList.remove("flip");
        void el.offsetWidth; // reflow
        el.classList.add("flip");
        setTimeout(() => {
          o.textContent = newStr[i];
          el.classList.remove("flip");
        }, 360);
      } else {
        o.textContent = newStr[i];
        n.textContent = newStr[i];
      }
    });
  }

  // increment once per browser/profile "visit"
  (function bumpVisit(){
    const v = Number(localStorage.getItem(COUNTER_KEY) || "0");
    setFlipNumber(v + 1);
  })();

  /********************
   * RADIO CONTROLS
   ********************/
  const radioAudio = document.getElementById("radioAudio");
  const radioPlay = document.getElementById("radioPlay");
  const radioStop = document.getElementById("radioStop");

  radioPlay.addEventListener("click", async () => {
    try{
      await radioAudio.play();
      radioPlay.classList.add("isPlaying");
    }catch(e){
      alert("Autoplay blocked. Tap PLAY again, or check mute settings.");
    }
  });

  radioStop.addEventListener("click", () => {
    radioAudio.pause();
    radioAudio.currentTime = 0;
    radioPlay.classList.remove("isPlaying");
  });

  /********************
   * WEATHER (COMPACT TOP RIGHT)
   ********************/
  const WX_KEY = "wt_weather_profile_v3";
  const miniWxLoc = document.getElementById("miniWxLoc");
  const miniWxNow = document.getElementById("miniWxNow");
  const miniWxMeta = document.getElementById("miniWxMeta");
  const miniWxInput = document.getElementById("miniWxInput");
  const miniWxUseLoc = document.getElementById("miniWxUseLoc");
  const miniWxUseSaved = document.getElementById("miniWxUseSaved");

  function wxSave(p){ localStorage.setItem(WX_KEY, JSON.stringify(p)); }
  function wxLoad(){ try{ return JSON.parse(localStorage.getItem(WX_KEY)); }catch{ return null; } }

  function mapWasteland(code){
    if([95,96,99].includes(code)) return "RADSTORM";
    if([61,63,65,80,81,82].includes(code)) return "ACID RAIN";
    if([45,48].includes(code)) return "RADCLOUDS";
    if([71,73,75,77].includes(code)) return "ASHFALL";
    if([0,1].includes(code)) return "CLEAR";
    if([2,3].includes(code)) return "CLOUDY";
    if([51,53,55].includes(code)) return "MIST";
    return "ATMOSPHERIC";
  }

  async function wxFetch(lat, lon){
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&daily=sunrise,sunset&temperature_unit=fahrenheit&windspeed_unit=mph&timezone=auto`;
    const r = await fetch(url);
    if(!r.ok) throw new Error("weather fetch failed");
    return r.json();
  }

  async function wxRender(p){
    miniWxLoc.textContent = `LOCATION: ${p.name}`;
    miniWxNow.textContent = `NOW: LOADING…`;
    miniWxMeta.textContent = `—`;

    try{
      const d = await wxFetch(p.latitude, p.longitude);
      const cw = d.current_weather;

      const cond = mapWasteland(cw.weathercode);
      const temp = Math.round(cw.temperature);
      const wind = Math.round(cw.windspeed);

      miniWxNow.textContent = `NOW: ${cond} • ${temp}°F • WIND ${wind} MPH`;

      const sr = new Date(d.daily.sunrise[0]).toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"});
      const ss = new Date(d.daily.sunset[0]).toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"});

      miniWxMeta.textContent = `SUNRISE ${sr} • SUNSET ${ss}`;
    }catch(e){
      miniWxNow.textContent = `NOW: FEED OFFLINE`;
      miniWxMeta.textContent = `—`;
    }
  }

  async function wxGeocode(q){
    const url = `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(q)}&count=1&format=json`;
    const r = await fetch(url);
    const j = await r.json();
    if(!j.results?.length) return null;
    const g = j.results[0];
    return { name: `${g.name}, ${g.country}`, latitude: g.latitude, longitude: g.longitude };
  }

  miniWxInput.addEventListener("keydown", async (e) => {
    if(e.key === "Enter"){
      const q = miniWxInput.value.trim();
      if(!q) return;
      miniWxInput.value = "";
      const p = await wxGeocode(q);
      if(!p){
        miniWxNow.textContent = "NOW: LOCATION NOT FOUND";
        return;
      }
      wxSave(p);
      wxRender(p);
    }
  });

  miniWxUseLoc.addEventListener("click", () => {
    if(!navigator.geolocation){
      miniWxNow.textContent = "NOW: GEO NOT AVAILABLE";
      return;
    }
    navigator.geolocation.getCurrentPosition(async (pos) => {
      const p = { name: "MY LOCATION", latitude: pos.coords.latitude, longitude: pos.coords.longitude };
      wxSave(p);
      wxRender(p);
    }, () => {
      miniWxNow.textContent = "NOW: LOCATION DENIED";
    });
  });

  miniWxUseSaved.addEventListener("click", () => {
    const p = wxLoad();
    if(p) wxRender(p);
  });

  // init weather
  const wxInit = wxLoad();
  if(wxInit) wxRender(wxInit);
  else miniWxNow.textContent = "NOW: ENTER LOCATION";

  /********************
   * NEWS TOP 5 LIST
   * (Uses your Netlify function: /.netlify/functions/fallout-news)
   ********************/
  const newsList = document.getElementById("newsList");
  const newsUpdated = document.getElementById("newsUpdated");
  const openNewest = document.getElementById("openNewest");
  const newsRefresh = document.getElementById("newsRefresh");

  function stamp(){ return new Date().toLocaleString(); }

  function itemHtml(item, isNewest){
    const safeTitle = (item.title || "").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    const safeSource = (item.source || "SOURCE").toUpperCase();
    const link = item.link || "#";

    return `
      <div class="newsItem ${isNewest ? "newest" : ""}">
        <a href="${link}" target="_blank" rel="noopener">
          <div class="headline">${safeTitle}</div>
          <div class="meta">SOURCE: ${safeSource}</div>
        </a>
      </div>
    `;
  }

  async function loadNews(){
    newsList.innerHTML = `
      <div class="newsItem">
        <div class="headline">LOADING FALLOUT HEADLINES…</div>
        <div class="meta">SOURCE: —</div>
      </div>
    `;
    newsUpdated.textContent = stamp();
    openNewest.href = "#";

    try{
      const r = await fetch("/.netlify/functions/fallout-news", { cache: "no-store" });
      const d = await r.json();
      if(!r.ok || !d.items?.length) throw new Error(d.error || "no headlines");

      const items = d.items.slice(0, 5);
      newsList.innerHTML = items.map((it, i) => itemHtml(it, i === 0)).join("");
      openNewest.href = items[0].link || "#";
      newsUpdated.textContent = stamp();
    }catch(e){
      newsList.innerHTML = `
        <div class="newsItem">
          <div class="headline amber mono">NEWS FEED OFFLINE</div>
          <div class="meta">SOURCE: SYSTEM</div>
        </div>
      `;
      newsUpdated.textContent = stamp();
    }
  }

  newsRefresh.addEventListener("click", loadNews);
  loadNews();
  // auto refresh every 10 minutes
  setInterval(loadNews, 10 * 60 * 1000);

  /********************
   * YOUTUBE LIVE CAM (SCAFFOLD)
   * Requires Netlify function later: /.netlify/functions/youtube-live
   * For now: shows standby image + links to channel.
   ********************/
  const liveBadge = document.getElementById("liveBadge");
  const livePlayer = document.getElementById("livePlayer");
  const openLive = document.getElementById("openLive");
  const openArchives = document.getElementById("openArchives");
  const checkLive = document.getElementById("checkLive");

  // TODO: set these to your channel URLs
  const YT_CHANNEL_URL = "https://www.youtube.com/@YOURCHANNEL";
  const YT_ARCHIVE_URL = "https://www.youtube.com/@YOURCHANNEL/videos";

  openLive.href = YT_CHANNEL_URL;
  openArchives.href = YT_ARCHIVE_URL;

  function showStandby(){
    liveBadge.hidden = true;
    // restore standby UI (don’t nuke your image)
    livePlayer.innerHTML = `
      <img id="standbyImg" class="standbyImg" src="/assets/standby.gif" alt="Please stand by">
      <div class="tiny dim" style="margin-top:8px">Standby. No broadcast detected.</div>
    `;
  }

  function showLive(videoId){
    liveBadge.hidden = false;
    // IMPORTANT: add your domain for embed to work reliably
    const embedUrl = `https://www.youtube.com/embed/${videoId}?autoplay=0&mute=0`;
    livePlayer.innerHTML = `
      <div class="ytWrap">
        <iframe
          src="${embedUrl}"
          title="Wasteland Live Cam"
          frameborder="0"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
          allowfullscreen></iframe>
      </div>
    `;
  }

  async function checkYouTubeLive(){
    // This will fail until the Netlify function exists — that’s okay.
    try{
      const r = await fetch("/.netlify/functions/youtube-live", { cache:"no-store" });
      const d = await r.json();
      if(!r.ok) throw new Error("no signal");
      if(d.isLive && d.videoId){
        showLive(d.videoId);
        openLive.href = d.liveUrl || YT_CHANNEL_URL;
      }else{
        showStandby();
      }
    }catch(e){
      // keep standby if not configured yet
      showStandby();
    }
  }

  checkLive.addEventListener("click", checkYouTubeLive);
  checkYouTubeLive();
  // check every 2 minutes
  setInterval(checkYouTubeLive, 2 * 60 * 1000);
</script>
